name: daily_routine
description: A high-end personal journal and routine tracker with gamified productivity features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts & Analytics
  fl_chart: ^0.68.0

  # Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # UI Components
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  image_picker: ^1.1.2
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
